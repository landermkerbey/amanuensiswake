server {
    # Redirect HTTP to HTTPS
    listen 80;
    listen [::]:80;
    server_name amanuensiswake.com www.amanuensiswake.com;
    return 301 https://$host$request_uri;
}

server {
    # TLS terminated by Cloudflare; origin certificate used for
    # Cloudflare → server leg (Full Strict mode).
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name amanuensiswake.com www.amanuensiswake.com;

    ssl_certificate     /etc/ssl/amanuensiswake/origin.pem;
    ssl_certificate_key /etc/ssl/amanuensiswake/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/amanuensiswake/dist;
    index index.html;

    charset utf-8;

    # Clean URLs: /essays/foo → /essays/foo/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}