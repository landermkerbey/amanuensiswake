server {
    # HTTPS/TLS is terminated by Cloudflare.
    # SSL configuration will be added when Cloudflare is enabled.
    listen 80;
    listen [::]:80;
    server_name amanuensiswake.com www.amanuensiswake.com;

    root /var/www/amanuensiswake/dist;
    index index.html;

    charset utf-8;

    # Clean URLs: /essays/foo → /essays/foo/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}